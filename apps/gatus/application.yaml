apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://twin.github.io/helm-charts
    chart: gatus
    targetRevision: 1.0.0
    helm:
      values: |
        config:
          storage:
            type: sqlite
            path: /data/data.db
          endpoints:
            - name: Mira
              group: Apps
              url: "http://mira.mira.svc.cluster.local"
              interval: 30s
              conditions:
                - "[STATUS] == 200"
        persistence:
          enabled: true
          size: 1Gi
        service:
          type: ClusterIP
          port: 8080
        ingress:
          enabled: true
          ingressClassName: nginx
          hosts:
            - host: gatus.local
              paths:
                - path: /
                  pathType: Prefix
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
