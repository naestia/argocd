apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-b
  namespace: app-b
  labels:
    app: app-b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-b
  template:
    metadata:
      labels:
        app: app-b
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        configMap:
          name: app-b-content
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-b-content
  namespace: app-b
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>App B</title>
      <style>
        body {
          font-family: system-ui, -apple-system, sans-serif;
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          margin: 0;
          background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
          color: white;
        }
        .container {
          text-align: center;
        }
        h1 {
          font-size: 4rem;
          margin: 0;
          text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        p {
          font-size: 1.5rem;
          opacity: 0.9;
        }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>⚡ Hello from App B</h1>
        <p>GitOps with ArgoCD on k3s</p>
      </div>
    </body>
    </html>
