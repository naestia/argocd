apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mira-beta
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: mira=ghcr.io/naestia/mira
    argocd-image-updater.argoproj.io/mira.update-strategy: semver
    argocd-image-updater.argoproj.io/mira.allow-tags: regexp:^[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/write-back-target: helmvalues:apps/mira/values-beta.yaml
spec:
  project: default
  source:
    repoURL: https://github.com/naestia/argocd
    targetRevision: HEAD
    path: apps/mira
    helm:
      valueFiles:
        - values-beta.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: mira-beta
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
