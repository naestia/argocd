*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);padding:40px 24px;line-height:1.6;}
.header{max-width:900px;margin:0 auto 40px;border-left:3px solid var(--blue);padding-left:20px;}

.header p{font-size:0.83rem;color:var(--text-dim);max-width:560px;}
.content{max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:10px;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px 14px;}
.stat-num{font-family:'IBM Plex Mono',monospace;font-size:1.4rem;font-weight:600;color:#e8f4ff;}
.stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.filter-btn{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--border-bright);background:transparent;border-radius:4px;padding:4px 10px;cursor:pointer;color:var(--text-dim);transition:all 0.15s;}
.filter-btn:hover{color:var(--text);border-color:var(--blue);}
.filter-btn.active{background:var(--blue-dim);color:var(--blue);border-color:var(--blue);}
.section{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--bg2);}
.section-header{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg3);cursor:pointer;user-select:none;}
.section-header:hover{background:#18233a;}
.step-num{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;font-weight:600;color:var(--bg);border-radius:4px;padding:2px 8px;letter-spacing:0.05em;white-space:nowrap;}
.c-network{background:var(--blue);}
.c-vuln{background:var(--purple);}
.c-incident{background:var(--orange);}
.c-monitoring{background:var(--teal);}
.c-access{background:var(--purple);}
.c-data{background:var(--green);}
.c-comms{background:var(--orange);}
.c-human{background:var(--red);}
.c-third{background:var(--blue);}
.c-governance{background:var(--green);}
.c-physical{background:#888;}
.c-ops{background:var(--yellow);}
.section-header h2{font-size:0.9rem;font-weight:600;color:#e8f4ff;flex:1;}
.header-meta{display:flex;align-items:center;gap:8px;}
.badge{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;padding:2px 8px;border-radius:20px;border:1px solid var(--border-bright);color:var(--text-dim);}
.count-pill{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;padding:2px 8px;border-radius:20px;border:1px solid var(--border-bright);color:var(--text-muted);}
.chevron{font-size:16px;color:var(--text-muted);transition:transform 0.2s;line-height:1;}
.chevron.open{transform:rotate(90deg);}
.section-body{display:none;padding:16px 18px;flex-direction:column;gap:10px;border-top:1px solid var(--border);}
.section-body.open{display:flex;}
.owner-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;}
.owner-lbl{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;}

.annex-tag{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;padding:2px 7px;border-radius:4px;background:var(--bg3);border:1px solid var(--border-bright);color:var(--text-dim);}

.orig-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text-dim);vertical-align:top;}
.orig-table tr:last-child td{border-bottom:none;}
.orig-table tr:hover td{background:var(--bg3);}
.orig-table td:first-child{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--text-muted);white-space:nowrap;}
.orig-table td:last-child{white-space:nowrap;}
.owner-chip{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;padding:2px 8px;border-radius:10px;border:1px solid;}

  const owners=[...new Set(data.flatMap(r=>r.originals.map(o=>o.owner)))].filter(o=>o!=="Unassigned").length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-num">${data.length}</div><div class="stat-lbl">Consolidated risks</div></div>
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Original risks</div></div>
    <div class="stat-card"><div class="stat-num">${owners}</div><div class="stat-lbl">Named owners</div></div>
  `;
}

function renderFilters(){
  const bar=document.getElementById('filter-bar');
  bar.innerHTML=`<button class="filter-btn active" onclick="setFilter('all',this)">ALL</button>`;
  risks.forEach(r=>{
    bar.innerHTML+=`<button class="filter-btn" onclick="setFilter('${r.cat}',this)">${r.catLabel.toUpperCase()}</button>`;
  });
}

function renderRisks(data){
  renderStats(data);
  const list=document.getElementById('risk-list');
  list.innerHTML='';
  data.forEach(r=>{
    const annexHtml=r.annex.map(a=>`<span class="annex-tag">${a}</span>`).join('');
    const originalsHtml=r.originals.map(o=>`
      <tr>
        <td>${o.id}</td>
        <td>${o.text}</td>
        <td><span class="owner-chip chip-${o.owner}">${o.owner}</span></td>
      </tr>
    `).join('');
    const el=document.createElement('div');
    el.className='section';
    el.dataset.cat=r.cat;
    el.innerHTML=`
      <div class="section-header" onclick="toggle(this)">
        <span class="step-num ${r.stepClass}">${r.id}</span>
        <h2>${r.title}</h2>
        <div class="header-meta">
          <span class="count-pill">${r.originals.length} risks</span>
          <span class="chevron">›</span>
        </div>
      </div>
      <div class="section-body">
        <div class="owner-row">
          <span class="owner-lbl">Suggested owner —</span>
          <span class="owner-val ov-${r.suggestedOwner}">${r.suggestedOwner}</span>
          <span style="flex:1"></span>
          <div class="annex-row">${annexHtml}</div>
        </div>
        <p style="font-size:0.82rem;color:var(--text-dim);">${r.desc}</p>
        <div>
          <div class="originals-lbl">Original risks mapped</div>
          <table class="orig-table">
            <thead><tr><th>ID</th><th>Risk</th><th>Owner</th></tr></thead>
            <tbody>${originalsHtml}</tbody>
          </table>
        </div>
      </div>
    `;
    list.appendChild(el);
  });
}

function toggle(header){
  const body=header.nextElementSibling;
  const chev=header.querySelector('.chevron');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function setFilter(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderRisks(cat==='all'?risks:risks.filter(r=>r.cat===cat));
}

renderFilters();
renderRisks(risks);
</script>
