apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatus-ingress
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/naestia/gitops-local
    targetRevision: HEAD
    path: monitoring/gatus/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
